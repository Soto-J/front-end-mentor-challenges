<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Inter:wght@400;700&family=Outfit:wght@300;400;600&family=Red+Hat+Display:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./index.css" />
        <title>Frontend Mentor | NFT preview card component</title>
    </head>
    <body>
        <main class="card">
            <div class="item equilibruim-img">
                <img src="./images/image-equilibrium.jpg" alt="Equilibrium" />
            </div>
            <h1 class="item header"><a href="#">Equilibrium #3429</a></h1>
            <p class="item content">
                Our Equilibrium collection promotes balance and calm.
            </p>
            <div class="item currency">
                <div class="ethereum">
                    <img src="./images/icon-ethereum.svg" alt="Ethereum Icon" />
                    <span>0.041 ETH</span>
                </div>
                <div class="timeleft">
                    <img src="./images/icon-clock.svg" alt="Clock Icon" />
                    <span>3 days left</span>
                </div>
            </div>
            <div class="linebreak"></div>
            <footer class="item author-container">
                <img src="./images/image-avatar.png" alt="Jules Wyvern" />

                <div>
                    Creation of <a href="#" class="author"> Jules Wyvern </a>
                </div>
            </footer>
        </main>

        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                >Frontend Mentor</a
            >. Coded by <a href="#">John Soto</a>.
        </footer>
    </body>
</html>
