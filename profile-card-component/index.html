<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Inter:wght@400;700&family=Kumbh+Sans:wght@400;700&family=Outfit:wght@300;400;600&family=Overpass:wght@400;700&family=Red+Hat+Display:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./index.css" />
        <title>Frontend Mentor | Profile card component</title>
    </head>
    <body>
        <main class="card">
            <div class="card-bg"></div>
            
            <section class="info | LR-padding">
                <div class="name">Victor Crest <span>26</span></div>
                <div>London</div>
            </section>
            
            <section class="LR-padding">
                <ul class="stats-list">
                    <li>
                        <div>80K</div>
                        <div>Followers</div>
                    </li>
                    <li>
                        <div>803K</div>
                        <div>Likes</div>
                    </li>
                    <li>
                        <div>1.4K</div>
                        <div>Photos</div>
                    </li>
                </ul>
            </section>
        </main>
        <div class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                >Frontend Mentor</a
            >. Coded by
            <a href="https://github.com/Soto-J" target="_blank">John Soto</a>.
        </div>
    </body>
</html>
