<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./index.css" />

        <title>Frontend Mentor | Stats preview card component</title>
    </head>
    <body>
        <div class="card-container">
            <main class="card">
                <section class="section content">
                    <header class="content-header">
                        <h1>
                            Get <span>insights</span> that help your business
                            grow.
                        </h1>
                    </header>
                    <p class="description">
                        Discover the benefits of data analytics and make better
                        decisions regarding revenue, customer experience, and
                        overall efficiency.
                    </p>
                    <footer class="content-footer">
                        <div>
                            <div class="footer-stats">10k+</div>
                            <span>Companies</span>
                        </div>
                        <div>
                            <div class="footer-stats">314</div>
                            <span>Templates</span>
                        </div>
                        <div>
                            <div class="footer-stats">12M+</div>
                            <span>Queries</span>
                        </div>
                    </footer>
                </section>
                <section class="section picture">
                    <img
                        src="./images/image-header-desktop.jpg"
                        alt="People on Computer Picture."
                    />
                </section>
            </main>
        </div>
        <footer>
            <div class="attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by <a href="#">John Soto</a>.
            </div>
        </footer>
    </body>
</html>
