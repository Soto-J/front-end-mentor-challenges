<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./index.css" />

        <title>Frontend Mentor | Stats preview card component</title>
    </head>
    <body class="card-container">
        <main class="card">
            
            <section class="content section">
                <header class="content-header | test">
                    <h1>
                        Get <span>insights</span> that help your business grow.
                    </h1>
                </header>
                <p class="content-description | test">
                    Discover the benefits of data analytics and make better
                    decisions regarding revenue, customer experience, and
                    overall efficiency.
                </p>
                <footer class="test">
                    <ul class="stats-list">
                        <li class="stats-item">
                            <h3>10k+</h3>
                            <div>Companies</div>
                        </li>
                        <li class="stats-item">
                            <h3>314</h3>
                            <div>Templates</div>
                        </li>
                        <li class="stats-item">
                            <h3>12M+</h3>
                            <div>Queries</div>
                        </li>
                    </ul>
                </footer>
            </section>

            <section class="picture section">
                <img
                    src="./images/image-header-desktop.jpg"
                    alt="People on Computer Picture."
                />
            </section>
        
        </main>
        <footer>
            <div class="attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by <a href="#">John Soto</a>.
            </div>
        </footer>
    </body>
</html>
